<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PhenilRoopa.ai</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0d0d14;
      --surface: #13131e;
      --surface2: #1a1a28;
      --border: rgba(255,255,255,0.07);
      --accent: #7c5cfc;
      --accent2: #a78bfa;
      --text: #f0eeff;
      --muted: #8880a8;
    }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      justify-content: center;
      height: 100vh;
      overflow: hidden;
    }
    #app {
      width: 100%;
      max-width: 680px;
      height: 100vh;
      display: flex;
      flex-direction: column;
      background: var(--surface);
    }
    header {
      padding: 18px 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }
    .logo {
      width: 36px; height: 36px;
      border-radius: 10px;
      background: var(--accent);
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; color: white;
    }
    .header-info h1 {
      font-family: 'Syne', sans-serif;
      font-size: 17px; font-weight: 700;
    }
    .header-info p { font-size: 12px; color: var(--muted); }
    .dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: #4ade80; box-shadow: 0 0 6px #4ade80;
      margin-left: auto;
    }
    #chat-body {
      flex: 1; overflow-y: auto;
      padding: 24px; display: flex;
      flex-direction: column; gap: 16px;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }
    .welcome {
      text-align: center; padding: 60px 20px;
      display: flex; flex-direction: column;
      align-items: center; gap: 14px;
      animation: fadeUp 0.5s ease both;
    }
    .welcome-icon {
      width: 70px; height: 70px; border-radius: 20px;
      background: rgba(124,92,252,0.15);
      border: 1px solid rgba(124,92,252,0.3);
      display: flex; align-items: center; justify-content: center;
      font-size: 32px;
    }
    .welcome h2 {
      font-family: 'Syne', sans-serif;
      font-size: 22px; font-weight: 700;
    }
    .welcome p { font-size: 14px; color: var(--muted); line-height: 1.6; max-width: 300px; }
    .suggestions {
      display: flex; flex-wrap: wrap;
      justify-content: center; gap: 8px; margin-top: 8px;
    }
    .suggestion {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 20px; padding: 8px 16px;
      font-size: 13px; color: var(--muted);
      cursor: pointer; transition: all 0.2s;
    }
    .suggestion:hover { border-color: var(--accent); color: var(--accent2); }
    .msg-row { display: flex; gap: 10px; animation: fadeUp 0.3s ease both; }
    .msg-row.user { flex-direction: row-reverse; }
    .avatar {
      width: 30px; height: 30px; border-radius: 8px;
      flex-shrink: 0; display: flex; align-items: center;
      justify-content: center; font-size: 13px;
      font-family: 'Syne', sans-serif; font-weight: 700;
      margin-top: 2px;
    }
    .bot-av { background: var(--accent); color: white; }
    .user-av { background: rgba(255,255,255,0.1); color: var(--text); }
    .bubble {
      padding: 12px 16px; font-size: 14.5px;
      line-height: 1.65; max-width: calc(100% - 80px);
      word-break: break-word; white-space: pre-wrap;
    }
    .bubble.user {
      background: linear-gradient(135deg, #7c5cfc, #a78bfa);
      color: white; border-radius: 14px 4px 14px 14px;
    }
    .bubble.bot {
      background: var(--surface2); color: var(--text);
      border: 1px solid var(--border);
      border-radius: 4px 14px 14px 14px;
    }
    .bubble.error {
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.3);
      color: #fca5a5;
      border-radius: 4px 14px 14px 14px;
    }
    .typing-bubble {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 4px 14px 14px 14px;
      padding: 16px 18px;
      display: flex; gap: 5px; align-items: center;
    }
    .typing-bubble span {
      width: 7px; height: 7px;
      background: var(--muted); border-radius: 50%;
      animation: bounce 1.2s infinite;
    }
    .typing-bubble span:nth-child(2) { animation-delay: 0.2s; }
    .typing-bubble span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%,60%,100% { transform: translateY(0); opacity: 0.4; }
      30% { transform: translateY(-6px); opacity: 1; }
    }
    #input-bar {
      padding: 14px 20px 20px;
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }
    .input-wrap {
      display: flex; align-items: flex-end; gap: 10px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 10px 12px 10px 16px;
      transition: border-color 0.2s;
    }
    .input-wrap:focus-within { border-color: rgba(124,92,252,0.5); }
    #user-input {
      flex: 1; background: none; border: none; outline: none;
      color: var(--text); font-family: 'DM Sans', sans-serif;
      font-size: 14.5px; line-height: 1.5;
      resize: none; max-height: 120px; min-height: 22px;
    }
    #user-input::placeholder { color: var(--muted); }
    #send-btn {
      width: 36px; height: 36px; border-radius: 10px;
      background: var(--accent); border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; transition: transform 0.15s, background 0.15s;
    }
    #send-btn:hover { background: var(--accent2); transform: scale(1.05); }
    #send-btn:active { transform: scale(0.95); }
    #send-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
    #send-btn svg { width: 16px; height: 16px; fill: white; }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div id="app">
    <header>
      <div class="logo">✦</div>
      <div class="header-info">
        <h1>PhenilRoopa.ai</h1>
        <p>Powered by Llama 3 (Groq)</p>
      </div>
      <div class="dot"></div>
    </header>

    <div id="chat-body">
      <div class="welcome" id="welcome">
        <div class="welcome-icon">✦</div>
        <h2>Hi, I'm PhenilRoopa</h2>
        <p>Your AI assistant. Ask me anything!</p>
        <div class="suggestions">
          <div class="suggestion" onclick="quickSend(this)">Write a poem 🎵</div>
          <div class="suggestion" onclick="quickSend(this)">Explain AI simply</div>
          <div class="suggestion" onclick="quickSend(this)">Tell me a joke 😄</div>
          <div class="suggestion" onclick="quickSend(this)">Help me code</div>
        </div>
      </div>
    </div>

    <div id="input-bar">
      <div class="input-wrap">
        <textarea id="user-input" placeholder="Ask me anything..." rows="1"></textarea>
        <button id="send-btn" onclick="sendMessage()" title="Send">
          <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
        </button>
      </div>
    </div>
  </div>

  <script>
    // ✅ CHANGE THIS to your Render backend URL
    const BACKEND_URL = 'https://phenilroopa-backend.onrender.com/chat';

    let chatHistory = [];
    let isLoading = false;
    const input = document.getElementById('user-input');
    const btn = document.getElementById('send-btn');
    const chatBody = document.getElementById('chat-body');

    input.addEventListener('input', function() {
      this.style.height = 'auto';
      this.style.height = Math.min(this.scrollHeight, 120) + 'px';
    });

    input.addEventListener('keydown', function(e) {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    function quickSend(el) {
      input.value = el.textContent.replace(/[^\w\s]/g, '').trim();
      sendMessage();
    }

    function removeWelcome() {
      const w = document.getElementById('welcome');
      if (w) w.remove();
    }

    function appendMsg(role, text, isError = false) {
      removeWelcome();
      const row = document.createElement('div');
      row.className = `msg-row ${role}`;

      const av = document.createElement('div');
      av.className = `avatar ${role === 'user' ? 'user-av' : 'bot-av'}`;
      av.textContent = role === 'user' ? 'U' : '✦';

      const bubble = document.createElement('div');
      bubble.className = `bubble ${isError ? 'error' : role}`;
      bubble.textContent = text;

      row.appendChild(av);
      row.appendChild(bubble);
      chatBody.appendChild(row);
      chatBody.scrollTop = chatBody.scrollHeight;
    }

    function showTyping() {
      removeWelcome();
      const row = document.createElement('div');
      row.className = 'msg-row bot';
      row.id = 'typing-row';
      const av = document.createElement('div');
      av.className = 'avatar bot-av';
      av.textContent = '✦';
      const bubble = document.createElement('div');
      bubble.className = 'typing-bubble';
      bubble.innerHTML = '<span></span><span></span><span></span>';
      row.appendChild(av);
      row.appendChild(bubble);
      chatBody.appendChild(row);
      chatBody.scrollTop = chatBody.scrollHeight;
    }

    function hideTyping() {
      const t = document.getElementById('typing-row');
      if (t) t.remove();
    }

    async function sendMessage() {
      if (isLoading) return;
      const text = input.value.trim();
      if (!text) return;

      appendMsg('user', text);
      input.value = '';
      input.style.height = 'auto';
      isLoading = true;
      btn.disabled = true;
      showTyping();

      try {
        const response = await fetch(BACKEND_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: text, history: chatHistory })
        });

        const data = await response.json();
        hideTyping();

        if (data.reply) {
          appendMsg('bot', data.reply);
          chatHistory.push({ role: 'user', content: text });
          chatHistory.push({ role: 'assistant', content: data.reply });
        } else {
          appendMsg('bot', '⚠ Error: ' + (data.details || data.error || 'Unknown error'), true);
        }
      } catch (err) {
        hideTyping();
        appendMsg('bot', '⚠ Could not reach the backend. Is it running on Render?', true);
        console.error(err);
      } finally {
        isLoading = false;
        btn.disabled = false;
        input.focus();
      }
    }
  </script>
</body>
</html>
