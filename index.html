<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PhenilRoopa.ai — Chat</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
  <style>
    :root {
      --pr-primary: #7c3aed;
      --pr-primary-light: #ede9fe;
      --pr-primary-dark: #5b21b6;
      --pr-accent: #a78bfa;
      --pr-bg: #f5f3ff;
      --pr-sidebar: #1e1b4b;
      --pr-sidebar-text: #c4b5fd;
      --pr-bubble-user: #7c3aed;
      --pr-bubble-bot: #ffffff;
      --pr-border: #e0d9f7;
      --pr-chat-bg: #faf9fe;
      --header-h: 64px;
      --input-h: 84px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--pr-bg);
      height: 100vh;
      overflow: hidden;
      display: flex;
    }

    /* ── Sidebar ── */
    #sidebar {
      width: 260px;
      min-width: 260px;
      background: var(--pr-sidebar);
      display: flex;
      flex-direction: column;
      height: 100vh;
      transition: transform .28s cubic-bezier(.4,0,.2,1);
      z-index: 200;
    }
    #sidebar .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 22px 20px 18px;
      border-bottom: 1px solid rgba(255,255,255,.08);
    }
    #sidebar .brand .logo-circle {
      width: 36px; height: 36px; border-radius: 50%;
      background: linear-gradient(135deg, #a78bfa, #7c3aed);
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 15px; color: #fff; flex-shrink: 0;
    }
    #sidebar .brand span { color: #fff; font-weight: 700; font-size: 17px; letter-spacing: .3px; }
    #sidebar .brand small { color: var(--pr-sidebar-text); font-size: 11px; display: block; }

    #sidebar .new-chat-btn {
      margin: 16px 14px 8px;
      padding: 10px 14px;
      border-radius: 10px;
      background: rgba(167,139,250,.18);
      border: 1px solid rgba(167,139,250,.3);
      color: #e9d5ff;
      font-size: 14px; font-weight: 500;
      cursor: pointer; text-align: left;
      display: flex; align-items: center; gap: 8px;
      transition: background .2s;
    }
    #sidebar .new-chat-btn:hover { background: rgba(167,139,250,.28); }

    #sidebar .history-label {
      padding: 12px 20px 6px;
      font-size: 11px; font-weight: 600; letter-spacing: .8px;
      color: rgba(196,181,253,.5); text-transform: uppercase;
    }

    #sidebar .history-list { flex: 1; overflow-y: auto; padding: 0 10px 12px; }
    #sidebar .history-list::-webkit-scrollbar { width: 4px; }
    #sidebar .history-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,.1); border-radius: 4px; }

    .history-item {
      padding: 9px 12px; border-radius: 8px; cursor: pointer;
      color: var(--pr-sidebar-text); font-size: 13px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      transition: background .18s; margin-bottom: 2px;
      display: flex; align-items: center; gap: 8px;
    }
    .history-item:hover { background: rgba(255,255,255,.07); color: #e9d5ff; }
    .history-item.active { background: rgba(124,58,237,.35); color: #fff; }

    #sidebar .sidebar-footer {
      padding: 12px 14px;
      border-top: 1px solid rgba(255,255,255,.08);
      font-size: 12px; color: rgba(196,181,253,.5);
      text-align: center;
    }

    /* ── Main ── */
    #main {
      flex: 1; display: flex; flex-direction: column;
      height: 100vh; overflow: hidden; position: relative;
    }

    /* ── Header ── */
    #chat-header {
      height: var(--header-h);
      background: #fff;
      border-bottom: 1px solid var(--pr-border);
      display: flex; align-items: center;
      padding: 0 20px; gap: 12px;
      flex-shrink: 0;
      box-shadow: 0 1px 4px rgba(124,58,237,.06);
    }
    #chat-header .model-badge {
      font-size: 12px; font-weight: 600;
      background: var(--pr-primary-light); color: var(--pr-primary-dark);
      border-radius: 20px; padding: 3px 10px;
    }
    #chat-header .status-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: #22c55e; animation: pulse 2s infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
    #chat-header .title { font-weight: 600; font-size: 15px; color: #1e1b4b; }
    #chat-header .sub { font-size: 12px; color: #6b7280; }
    #toggle-sidebar {
      background: none; border: none; cursor: pointer;
      color: #7c3aed; font-size: 18px; display: none; padding: 4px;
    }

    /* ── Chat body ── */
    #chat-body {
      flex: 1; overflow-y: auto;
      padding: 24px 20px;
      background: var(--pr-chat-bg);
      scroll-behavior: smooth;
    }
    #chat-body::-webkit-scrollbar { width: 5px; }
    #chat-body::-webkit-scrollbar-thumb { background: #d8b4fe; border-radius: 4px; }

    /* ── Welcome screen ── */
    #welcome {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      min-height: 60vh; text-align: center; gap: 16px;
    }
    #welcome .hero-logo {
      width: 72px; height: 72px; border-radius: 50%;
      background: linear-gradient(135deg, #c4b5fd, #7c3aed);
      display: flex; align-items: center; justify-content: center;
      font-size: 30px; font-weight: 800; color: #fff;
      margin-bottom: 8px;
    }
    #welcome h2 { font-size: 24px; font-weight: 700; color: #1e1b4b; }
    #welcome p { color: #6b7280; font-size: 15px; max-width: 380px; line-height: 1.6; }
    .suggestion-pills {
      display: flex; flex-wrap: wrap; gap: 8px;
      justify-content: center; margin-top: 8px; max-width: 480px;
    }
    .suggestion-pill {
      border: 1px solid var(--pr-accent); color: var(--pr-primary-dark);
      background: var(--pr-primary-light); border-radius: 20px;
      padding: 7px 16px; font-size: 13px; cursor: pointer;
      transition: background .18s, transform .1s;
    }
    .suggestion-pill:hover {
      background: #ddd6fe; transform: translateY(-1px);
    }

    /* ── Messages ── */
    .msg-row { display: flex; gap: 10px; margin-bottom: 18px; align-items: flex-end; }
    .msg-row.user { flex-direction: row-reverse; }

    .avatar {
      width: 34px; height: 34px; border-radius: 50%; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; font-weight: 700;
    }
    .avatar.bot {
      background: linear-gradient(135deg, #c4b5fd, #7c3aed); color: #fff;
    }
    .avatar.user { background: #1e1b4b; color: #a78bfa; }

    .bubble {
      max-width: 72%; padding: 13px 16px;
      border-radius: 18px; font-size: 14.5px; line-height: 1.65;
      word-break: break-word;
    }
    .bubble.bot {
      background: var(--pr-bubble-bot); color: #1e1b4b;
      border: 1px solid var(--pr-border);
      border-bottom-left-radius: 4px;
      box-shadow: 0 1px 4px rgba(0,0,0,.06);
    }
    .bubble.user {
      background: var(--pr-bubble-user); color: #fff;
      border-bottom-right-radius: 4px;
    }

    .msg-time {
      font-size: 10.5px; color: #9ca3af; margin-top: 4px; padding: 0 4px;
    }
    .msg-row.user .msg-time { text-align: right; }

    /* typing dots */
    .typing-bubble { display: flex; align-items: center; gap: 5px; padding: 14px 18px; }
    .dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--pr-accent); animation: bounce .9s infinite;
    }
    .dot:nth-child(2) { animation-delay: .18s; }
    .dot:nth-child(3) { animation-delay: .36s; }
    @keyframes bounce { 0%,80%,100%{transform:scale(1)} 40%{transform:scale(1.4)} }

    /* ── Input bar ── */
    #input-bar {
      background: #fff; border-top: 1px solid var(--pr-border);
      padding: 12px 16px; flex-shrink: 0;
    }
    #input-wrap {
      display: flex; align-items: flex-end; gap: 10px;
      background: #faf9fe; border: 1.5px solid var(--pr-border);
      border-radius: 14px; padding: 8px 12px;
      transition: border-color .2s, box-shadow .2s;
    }
    #input-wrap:focus-within {
      border-color: var(--pr-accent);
      box-shadow: 0 0 0 3px rgba(124,58,237,.12);
    }
    #user-input {
      flex: 1; border: none; background: transparent; resize: none;
      font-size: 14.5px; color: #1e1b4b; outline: none;
      max-height: 120px; min-height: 24px; line-height: 1.5;
      font-family: inherit;
    }
    #user-input::placeholder { color: #9ca3af; }
    #send-btn {
      width: 38px; height: 38px; border-radius: 10px;
      background: var(--pr-primary); border: none; color: #fff;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; font-size: 16px; flex-shrink: 0;
      transition: background .18s, transform .1s;
    }
    #send-btn:hover { background: var(--pr-primary-dark); transform: scale(1.06); }
    #send-btn:active { transform: scale(.96); }
    #send-btn:disabled { background: #c4b5fd; cursor: not-allowed; transform: none; }
    .input-hint {
      font-size: 11.5px; color: #9ca3af; text-align: center;
      margin-top: 7px; padding: 0 4px;
    }

    /* ── Error toast ── */
    #error-toast {
      position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%);
      background: #fef2f2; border: 1px solid #fca5a5; color: #dc2626;
      border-radius: 10px; padding: 10px 20px;
      font-size: 13px; display: none; z-index: 999;
      box-shadow: 0 4px 16px rgba(0,0,0,.1);
    }

    /* ── Responsive ── */
    @media (max-width: 720px) {
      #sidebar {
        position: fixed; left: 0; top: 0;
        transform: translateX(-100%);
      }
      #sidebar.open { transform: translateX(0); }
      #toggle-sidebar { display: block !important; }
      #overlay {
        display: none; position: fixed; inset: 0;
        background: rgba(0,0,0,.4); z-index: 199;
      }
      #overlay.show { display: block; }
      .bubble { max-width: 88%; }
    }

    /* code blocks inside bot messages */
    .bubble.bot code {
      background: #f3f0ff; border-radius: 5px;
      padding: 1px 5px; font-size: 13px; color: #5b21b6;
    }
    .bubble.bot pre {
      background: #f3f0ff; border-radius: 8px;
      padding: 12px; overflow-x: auto; margin-top: 8px;
      font-size: 13px;
    }
    .bubble.bot pre code { background: none; padding: 0; }

    /* markdown-like bold/italic */
    .bubble strong { font-weight: 600; }
    .bubble em { font-style: italic; }
  </style>
</head>
<body>

<!-- Sidebar overlay (mobile) -->
<div id="overlay" onclick="closeSidebar()"></div>

<!-- ── Sidebar ── -->
<aside id="sidebar">
  <div class="brand">
    <div class="logo-circle">P</div>
    <div>
      <span>PhenilRoopa</span>
      <small>.ai assistant</small>
    </div>
  </div>

  <button class="new-chat-btn" onclick="newChat()">
    <i class="bi bi-plus-lg"></i> New Chat
  </button>

  <div class="history-label">Recent</div>
  <div class="history-list" id="history-list">
    <!-- populated by JS -->
  </div>

  <div class="sidebar-footer">
    Powered by PhenilRoopa.ai
  </div>
</aside>

<!-- ── Main ── -->
<div id="main">

  <!-- Header -->
  <header id="chat-header">
    <button id="toggle-sidebar" onclick="toggleSidebar()">
      <i class="bi bi-list"></i>
    </button>
    <div class="status-dot"></div>
    <div>
      <div class="title">PhenilRoopa.ai</div>
      <div class="sub">AI Assistant · Online</div>
    </div>
    <div class="ms-auto d-flex align-items-center gap-2">
      <span class="model-badge">v1.0</span>
      <button class="btn btn-sm" style="border:1px solid #e0d9f7; color:#7c3aed; border-radius:8px;"
        onclick="newChat()" title="Clear chat">
        <i class="bi bi-arrow-counterclockwise"></i>
      </button>
    </div>
  </header>

  <!-- Chat body -->
  <div id="chat-body">
    <!-- Welcome screen -->
    <div id="welcome">
      <div class="hero-logo">P</div>
      <h2>Welcome to PhenilRoopa.ai</h2>
      <p>Your intelligent AI assistant. Ask me anything — I'm here to help you think, write, and create.</p>
      <div class="suggestion-pills" id="pills"></div>
    </div>
  </div>

  <!-- Input bar -->
  <div id="input-bar">
    <div id="input-wrap">
      <textarea id="user-input" rows="1" placeholder="Ask PhenilRoopa anything…"
        onInput="autoResize(this)" onKeydown="handleKey(event)"></textarea>
      <button id="send-btn" onclick="sendMessage()" title="Send (Enter)">
        <i class="bi bi-send-fill"></i>
      </button>
    </div>
    <div class="input-hint">Press <kbd>Enter</kbd> to send &nbsp;·&nbsp; <kbd>Shift+Enter</kbd> for new line</div>
  </div>

</div>

<!-- Error toast -->
<div id="error-toast"><i class="bi bi-exclamation-circle me-2"></i><span id="error-msg"></span></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
const BACKEND = 'https://phenilroopa-backend.onrender.com';
const CHAT_ENDPOINT = BACKEND + '/chat';

let history = [];      // [{role, content}]
let sessionId = null;
let typing = false;
let chatSessions = JSON.parse(localStorage.getItem('pr_sessions') || '[]');

const suggestions = [
  'Who created you?',
  'What can you help me with?',
  'Write a poem about the ocean',
  'Explain quantum computing simply',
  'Tell me a fun fact',
  'Help me brainstorm ideas'
];

function init() {
  const pillsEl = document.getElementById('pills');
  suggestions.forEach(s => {
    const p = document.createElement('button');
    p.className = 'suggestion-pill';
    p.textContent = s;
    p.onclick = () => { document.getElementById('user-input').value = s; sendMessage(); };
    pillsEl.appendChild(p);
  });
  renderHistory();
}

function renderHistory() {
  const list = document.getElementById('history-list');
  list.innerHTML = '';
  if (!chatSessions.length) {
    list.innerHTML = '<div style="color:rgba(196,181,253,.35);font-size:12px;padding:8px 12px;">No chats yet</div>';
    return;
  }
  chatSessions.slice().reverse().forEach((s, i) => {
    const d = document.createElement('div');
    d.className = 'history-item' + (s.id === sessionId ? ' active' : '');
    d.innerHTML = `<i class="bi bi-chat-left-text" style="font-size:13px;flex-shrink:0"></i>${escapeHtml(s.preview)}`;
    d.title = s.preview;
    d.onclick = () => loadSession(s.id);
    list.appendChild(d);
  });
}

function loadSession(id) {
  const s = chatSessions.find(x => x.id === id);
  if (!s) return;
  sessionId = id;
  history = s.history || [];
  const body = document.getElementById('chat-body');
  body.innerHTML = '';
  history.forEach(m => appendBubble(m.role, m.content, false));
  body.scrollTop = body.scrollHeight;
  renderHistory();
  closeSidebar();
}

function newChat() {
  sessionId = 'session_' + Date.now();
  history = [];
  const body = document.getElementById('chat-body');
  body.innerHTML = `<div id="welcome">
    <div class="hero-logo">P</div>
    <h2>Welcome to PhenilRoopa.ai</h2>
    <p>Your intelligent AI assistant. Ask me anything — I'm here to help you think, write, and create.</p>
    <div class="suggestion-pills" id="pills"></div>
  </div>`;
  const pillsEl = document.getElementById('pills');
  suggestions.forEach(s => {
    const p = document.createElement('button');
    p.className = 'suggestion-pill';
    p.textContent = s;
    p.onclick = () => { document.getElementById('user-input').value = s; sendMessage(); };
    pillsEl.appendChild(p);
  });
  renderHistory();
  closeSidebar();
}

async function sendMessage() {
  if (typing) return;
  const input = document.getElementById('user-input');
  const text = input.value.trim();
  if (!text) return;

  hideWelcome();
  input.value = '';
  autoResize(input);

  if (!sessionId) sessionId = 'session_' + Date.now();

  history.push({ role: 'user', content: text });
  appendBubble('user', text);
  showTyping();
  setSendDisabled(true);

  try {
    const res = await fetch(CHAT_ENDPOINT, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: text, history: history.slice(0, -1), sessionId })
    });

    if (!res.ok) throw new Error('Server error ' + res.status);
    const data = await res.json();

    const reply = data.reply || data.response || data.message ||
                  data.answer || data.text ||
                  (data.choices && data.choices[0]?.message?.content) ||
                  extractReply(data);

    if (!reply) throw new Error('Empty response from server');

    history.push({ role: 'assistant', content: reply });
    removeTyping();
    appendBubble('assistant', reply);
    saveSession(text);

  } catch (err) {
    removeTyping();
    const fallback = getFallback(text);
    history.push({ role: 'assistant', content: fallback });
    appendBubble('assistant', fallback);
    saveSession(text);
    showError('Could not reach server — showing offline response.');
  } finally {
    setSendDisabled(false);
    typing = false;
  }
}

function extractReply(data) {
  if (typeof data === 'string') return data;
  const keys = Object.keys(data);
  for (const k of keys) {
    if (typeof data[k] === 'string' && data[k].length > 4) return data[k];
  }
  return JSON.stringify(data);
}

function getFallback(text) {
  const t = text.toLowerCase();
  if (t.includes('hello') || t.includes('hi') || t.includes('hey'))
    return "Hello! I'm PhenilRoopa.ai. How can I help you today?";
  if (t.includes('who') && t.includes('creat'))
    return "I was created by Phenil Chauhan as an intelligent AI assistant.";
  if (t.includes('who are you') || t.includes('what are you'))
    return "I'm PhenilRoopa.ai, an AI assistant built to help you with questions, writing, and more!";
  if (t.includes('thank'))
    return "You're welcome! Let me know if there's anything else I can help with.";
  return "I'm having trouble connecting to the server right now. Please try again in a moment — I'm always happy to help!";
}

function hideWelcome() {
  const w = document.getElementById('welcome');
  if (w) w.remove();
}

function appendBubble(role, content, scroll = true) {
  const body = document.getElementById('chat-body');
  const isUser = role === 'user';

  const row = document.createElement('div');
  row.className = 'msg-row ' + (isUser ? 'user' : 'bot');

  const avatar = document.createElement('div');
  avatar.className = 'avatar ' + (isUser ? 'user' : 'bot');
  avatar.textContent = isUser ? 'U' : 'P';

  const col = document.createElement('div');

  const bubble = document.createElement('div');
  bubble.className = 'bubble ' + (isUser ? 'user' : 'bot');
  bubble.innerHTML = formatText(content);

  const time = document.createElement('div');
  time.className = 'msg-time';
  time.textContent = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

  col.appendChild(bubble);
  col.appendChild(time);

  if (isUser) {
    row.appendChild(col);
    row.appendChild(avatar);
  } else {
    row.appendChild(avatar);
    row.appendChild(col);
  }

  body.appendChild(row);
  if (scroll) body.scrollTop = body.scrollHeight;
}

function showTyping() {
  typing = true;
  const body = document.getElementById('chat-body');
  const row = document.createElement('div');
  row.className = 'msg-row bot';
  row.id = 'typing-row';

  const avatar = document.createElement('div');
  avatar.className = 'avatar bot';
  avatar.textContent = 'P';

  const bubble = document.createElement('div');
  bubble.className = 'bubble bot typing-bubble';
  bubble.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div>';

  row.appendChild(avatar);
  row.appendChild(bubble);
  body.appendChild(row);
  body.scrollTop = body.scrollHeight;
}

function removeTyping() {
  const el = document.getElementById('typing-row');
  if (el) el.remove();
}

function saveSession(preview) {
  const existing = chatSessions.findIndex(s => s.id === sessionId);
  const session = { id: sessionId, preview: preview.slice(0, 50), history: [...history] };
  if (existing >= 0) chatSessions[existing] = session;
  else chatSessions.push(session);
  if (chatSessions.length > 30) chatSessions = chatSessions.slice(-30);
  localStorage.setItem('pr_sessions', JSON.stringify(chatSessions));
  renderHistory();
}

function formatText(text) {
  return text
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/```([\s\S]*?)```/g, '<pre><code>$1</code></pre>')
    .replace(/`([^`]+)`/g, '<code>$1</code>')
    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.*?)\*/g, '<em>$1</em>')
    .replace(/\n/g, '<br>');
}

function escapeHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}

function setSendDisabled(v) {
  document.getElementById('send-btn').disabled = v;
}

function showError(msg) {
  const t = document.getElementById('error-toast');
  document.getElementById('error-msg').textContent = msg;
  t.style.display = 'block';
  setTimeout(() => t.style.display = 'none', 4000);
}

function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('overlay').classList.toggle('show');
}

function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('overlay').classList.remove('show');
}

init();
</script>
</body>
</html>
