<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PhenilRoopa.ai — Chat</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<div id="overlay" onclick="closeSidebar()"></div>

<aside id="sidebar">
  <div class="brand">
    <div class="logo-circle">P</div>
    <div>
      <span class="brand-name">PhenilRoopa</span>
      <small class="brand-sub">.ai assistant</small>
    </div>
  </div>
  <button class="new-chat-btn" onclick="newChat()">
    <i class="bi bi-plus-lg"></i> New Chat
  </button>
  <div class="history-label">Recent</div>
  <div class="history-list" id="history-list"></div>
  <div class="sidebar-footer">Powered by PhenilRoopa.ai</div>
</aside>

<div id="main">
  <header id="chat-header">
    <button id="toggle-sidebar" onclick="toggleSidebar()"><i class="bi bi-list"></i></button>
    <div class="status-dot"></div>
    <div>
      <div class="header-title">PhenilRoopa.ai</div>
      <div class="header-sub">AI Assistant · Online</div>
    </div>
    <div class="ms-auto d-flex align-items-center gap-2">
      <span class="model-badge">v1.0</span>
      <button class="header-clear-btn" onclick="newChat()" title="New chat">
        <i class="bi bi-arrow-counterclockwise"></i>
      </button>
    </div>
  </header>

  <div id="chat-body">
    <div id="welcome">
      <div class="hero-logo">P</div>
      <h2>Welcome to PhenilRoopa.ai</h2>
      <p>Your intelligent AI assistant. Ask me anything.</p>
      <div class="suggestion-pills" id="pills"></div>
    </div>
  </div>

  <div id="input-bar">
    <div id="input-wrap">
      <textarea id="user-input" rows="1" placeholder="Ask PhenilRoopa anything..." oninput="autoResize(this)" onkeydown="handleKey(event)"></textarea>
      <button id="send-btn" onclick="sendMessage()"><i class="bi bi-send-fill"></i></button>
    </div>
    <div class="input-hint">Press Enter to send · Shift+Enter for new line</div>
  </div>
</div>

<div id="error-toast">
  <i class="bi bi-exclamation-circle me-2"></i>
  <span id="error-msg"></span>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="script.js"></script>
</body>
</html>
