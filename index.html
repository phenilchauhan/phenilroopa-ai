<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PhenilRoopa.ai — Chat</title>

  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
  <!-- Your custom styles -->
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<!-- Mobile sidebar overlay -->
<div id="overlay" onclick="closeSidebar()"></div>

<!-- ══════════════════ SIDEBAR ══════════════════ -->
<aside id="sidebar">

  <div class="brand">
    <div class="logo-circle">P</div>
    <div>
      <span class="brand-name">PhenilRoopa</span>
      <small class="brand-sub">.ai assistant</small>
    </div>
  </div>

  <button class="new-chat-btn" onclick="newChat()">
    <i class="bi bi-plus-lg"></i> New Chat
  </button>

  <div class="history-label">Recent</div>
  <div class="history-list" id="history-list">
    <!-- Populated by script.js -->
  </div>

  <div class="sidebar-footer">
    Powered by PhenilRoopa.ai
  </div>

</aside>

<!-- ══════════════════ MAIN ══════════════════ -->
<div id="main">

  <!-- ── Header ── -->
  <header id="chat-header">
    <button id="toggle-sidebar" onclick="toggleSidebar()">
      <i class="bi bi-list"></i>
    </button>

    <div class="status-dot"></div>

    <div>
      <div class="header-title">PhenilRoopa.ai</div>
      <div class="header-sub">AI Assistant · Online</div>
    </div>

    <div class="ms-auto d-flex align-items-center gap-2">
      <span class="model-badge">v1.0</span>
      <button class="header-clear-btn" onclick="newChat()" title="New chat">
        <i class="bi bi-arrow-counterclockwise"></i>
      </button>
    </div>
  </header>

  <!-- ── Chat body ── -->
  <div id="chat-body">

    <!-- Welcome screen (removed when first message is sent) -->
    <div id="welcome">
      <div class="hero-logo">P</div>
      <h2>Welcome to PhenilRoopa.ai</h2>
      <p>Your intelligent AI assistant. Ask me anything — I'm here to help you think, write, and create.</p>
      <div class="suggestion-pills" id="pills">
        <!-- Populated by script.js -->
      </div>
    </div>

  </div><!-- /#chat-body -->

  <!-- ── Input bar ── -->
  <div id="input-bar">
    <div id="input-wrap">
      <textarea
        id="user-input"
        rows="1"
        placeholder="Ask PhenilRoopa anything…"
        oninput="autoResize(this)"
        onkeydown="handleKey(event)"
      ></textarea>
      <button id="send-btn" onclick="sendMessage()" title="Send (Enter)">
        <i class="bi bi-send-fill"></i>
      </button>
    </div>
    <div class="input-hint">
      Press <kbd>Enter</kbd> to send &nbsp;·&nbsp; <kbd>Shift+Enter</kbd> for new line
    </div>
  </div>

</div><!-- /#main -->

<!-- Error toast -->
<div id="error-toast">
  <i class="bi bi-exclamation-circle me-2"></i>
  <span id="error-msg"></span>
</div>

<!-- Bootstrap 5 JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<!-- Your chat logic -->
<script src="script.js"></script>

</body>
</html>
