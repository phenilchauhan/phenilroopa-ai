<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>PhenilRoopa.ai</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>

  <style>
    body { background:#0d0d14; color:#fff; font-family:sans-serif; }
    .chat-box { max-width:600px; margin:50px auto; }
    .chat-msg { display:flex; margin-bottom:10px; }
    .chat-msg.user { justify-content:flex-end; }
    .bubble {
      padding:10px 14px;
      border-radius:10px;
      max-width:75%;
    }
    .user .bubble { background:#7c5cfc; }
    .bot .bubble { background:#1a1a28; border:1px solid #333; }
    .typing { font-size:12px; opacity:0.6; }
    input { background:#1a1a28; border:1px solid #333; color:#fff; }
  </style>
</head>

<body>

<div class="chat-box">
  <h4>PhenilRoopa AI</h4>

  <div id="messages"></div>

  <div class="d-flex mt-3 gap-2">
    <input id="input" class="form-control" placeholder="Ask something..." />
    <button onclick="send()" class="btn btn-primary">Send</button>
  </div>
</div>

<script>
const BACKEND = "https://phenilroopa-backend.onrender.com/chat";

let history = [];
let loading = false;

const input = document.getElementById("input");
const messages = document.getElementById("messages");

input.addEventListener("keydown", e => {
  if (e.key === "Enter" && !e.shiftKey) {
    e.preventDefault();
    send();
  }
});

function addMsg(role, text, error=false) {
  const div = document.createElement("div");
  div.className = "chat-msg " + role;

  const bubble = document.createElement("div");
  bubble.className = "bubble";

  if(error) bubble.style.color = "red";

  bubble.textContent = text;

  div.appendChild(bubble);
  messages.appendChild(div);

  setTimeout(() => {
    messages.scrollTop = messages.scrollHeight;
  }, 50);
}

function typingShow() {
  const t = document.createElement("div");
  t.id = "typing";
  t.className = "typing";
  t.innerText = "AI is typing...";
  messages.appendChild(t);
}

function typingHide() {
  const t = document.getElementById("typing");
  if (t) t.remove();
}

async function send() {
  if (loading) return;

  const text = input.value.trim();
  if (!text) return;

  addMsg("user", text);

  input.value = "";
  input.disabled = true;
  loading = true;

  typingShow();

  try {
    const controller = new AbortController();
    const timeout = setTimeout(() => controller.abort(), 15000);

    const start = performance.now();

    const res = await fetch(BACKEND, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ message: text, history }),
      signal: controller.signal
    });

    clearTimeout(timeout);

    const data = await res.json();

    typingHide();

    if (data.reply) {
      const end = performance.now();
      const time = Math.round(end - start);

      let reply = data.reply.substring(0, 5000); // limit

      addMsg("bot", reply + "\n\n⚡ " + time + "ms");

      history.push({ role: "user", content: text });
      history.push({ role: "assistant", content: reply });

    } else {
      addMsg("bot", "Error: " + (data.error || "Unknown"), true);
    }

  } catch (err) {
    typingHide();

    addMsg("bot", "⚠️ Server waking up... try again in 5 seconds.", true);
  }

  input.disabled = false;
  input.focus();
  loading = false;
}
</script>

</body>
</html>
